; PlatformIO Project Configuration File
;
; --- Two upload methods ---
;   Cable (FTDI, COM13):   pio run -e esp32cam     -t upload
;   OTA   (over WiFi):     pio run -e esp32cam_ota -t upload
;
; The generic "Upload" button (or `pio run -t upload` with no -e) defaults to
; the OTA env below. Use the env-specific task in the PlatformIO sidebar when
; you need to cable-flash (first time, or recovering from a bad OTA).

[platformio]
default_envs = esp32cam_ota

[env:esp32cam]
; Versions pinned for reproducibility — PlatformIO downloads and caches
; the exact same toolchain + libraries on any machine that builds this.
platform = espressif32 @ ~7.0.1
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
; min_spiffs.csv = two ~1.9MB app slots (needed for OTA) + tiny SPIFFS.
board_build.partitions = min_spiffs.csv
lib_deps =
    tzapu/WiFiManager @ ^2.0.17

; OTA upload variant — pushes firmware over WiFi to the running ESP.
; Inherits everything from [env:esp32cam] above.
[env:esp32cam_ota]
extends = env:esp32cam
upload_protocol = espota
upload_port = esp32cam.local
; If mDNS doesn't resolve on your laptop, replace .local with the IP printed
; in the serial monitor, e.g.  upload_port = 192.168.1.45
